<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad de Alto Desempenho - Marketplace Industrial</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/3b82f6/wrench.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f4f7f9; color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; line-height: 1.6; }
        
        header { 
            background: linear-gradient(90deg, #020617 0%, #0f172a 100%); 
            color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid #3b82f6; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; color: #60a5fa; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; }
        .search-bar { flex-grow: 1; margin: 0 40px; max-width: 700px; }
        .search-bar input { width: 100%; padding: 12px 25px; border-radius: 12px; border: 2px solid #334155; background: #020617; color: white; outline: none; }
        .nav-icons { display: flex; gap: 30px; align-items: center; }
        .nav-icons a { color: white; text-decoration: none; font-size: 1.4rem; position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: #ef4444; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; font-weight: bold; display: none; }

        .container { max-width: 1300px; margin: 40px auto; padding: 0 30px; flex: 1; }
        .section-title { margin-bottom: 35px; font-weight: 700; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        .product-card { background: white; border-radius: 15px; padding: 25px; transition: 0.3s; border: 1px solid #e2e8f0; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .product-card img { width: 100%; height: 220px; object-fit: contain; margin-bottom: 20px; }
        .price { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .squad-express { color: #3b82f6; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-top: 5px; display: flex; align-items: center; gap: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; margin: auto; width: 100%; max-width: 1000px; border-radius: 16px; padding: 40px; position: relative; }
        .close-btn { position: absolute; right: 25px; top: 20px; font-size: 2.5rem; cursor: pointer; color: #94a3b8; }
        .modal-header { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .modal-left img { width: 100%; border-radius: 12px; }
        
        .qty-selector { display: flex; align-items: center; gap: 15px; margin: 20px 0; }
        .qty-input { width: 70px; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.1rem; }

        .btn-action { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-buy-card { background: #eff6ff; color: #3b82f6; border: 1.5px solid #3b82f6; margin-top: 15px; padding: 12px; }
        .btn-buy-card:hover { background: #3b82f6; color: white; }

        .info-tabs { display: flex; gap: 25px; border-bottom: 2px solid #f1f5f9; margin-top: 30px; }
        .tab { padding: 10px 0; cursor: pointer; font-weight: 700; color: #94a3b8; border-bottom: 3px solid transparent; }
        .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
        .tab-content { display: none; padding: 25px 0; }
        .tab-content.active { display: block; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .cart-total { margin-top: 25px; font-size: 1.6rem; font-weight: 800; text-align: right; color: #020617; }

        footer { background: #020617; color: #94a3b8; padding: 60px 5% 40px; border-top: 4px solid #3b82f6; }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fas fa-microchip"></i> <span>SQUAD DE ALTO DESEMPENHO</span></div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="O que deseja?" onkeyup="filterProducts()">
    </div>
    <div class="nav-icons">
        <a onclick="openCart()"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></a>
        <a href="dashboard.html"><i class="fas fa-user-gear"></i></a>
    </div>
</header>

<div class="main-content">
    <div class="container">
        <h2 class="section-title">Tecnologia Industrial</h2>
        <div class="product-grid" id="produtos"></div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('productModal')">&times;</span>
        <div class="modal-header">
            <div class="modal-left"><img id="mImg" src="" alt=""></div>
            <div class="modal-right">
                <div class="badge" style="background: #eff6ff; color: #1e40af; padding: 5px 12px; border-radius: 6px; font-weight: 700; font-size: 0.8rem;">CERTIFICADO ISO 9001</div>
                <h2 id="mTitle" style="margin: 15px 0; font-size: 1.8rem;"></h2>
                <div class="modal-price" id="mPrice" style="font-size: 2.5rem; color: #020617;"></div>
                <div class="squad-express" style="font-size: 0.9rem; margin: 10px 0;"><i class="fas fa-bolt-lightning"></i> Squad Express - Entrega Prioritária</div>
                
                <div class="qty-selector">
                    <label style="font-weight: 700;">Quantidade:</label>
                    <input type="number" id="mQty" class="qty-input" value="1" min="1">
                </div>

                <button id="btnAddToCart" class="btn-action btn-primary">Adicionar ao Carrinho</button>
            </div>
        </div>
        <div class="info-tabs">
            <div class="tab active" onclick="switchTab('desc', this)">Descrição</div>
        </div>
        <div id="content-desc" class="tab-content active"><p id="mDesc" style="font-size: 1.05rem;"></p></div>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content" style="max-width: 650px;">
        <span class="close-btn" onclick="closeModal('cartModal')">&times;</span>
        <h2 style="font-size: 1.8rem;"><i class="fas fa-shopping-cart" style="color: #3b82f6;"></i> Seu Carrinho</h2>
        <div id="cartItemsList" style="margin-top:25px;"></div>
        <div id="totalContainer" class="cart-total">Total: R$ 0,00</div>
        <button class="btn-action btn-primary" style="margin-top: 30px;" onclick="checkout()">Finalizar Compra Industrial</button>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO DA API ---
    const API_BASE = "http://localhost:8000";

    const listaProdutos = [
        { id: 1, nome: "Engrenagem Industrial", preco: 189.90, img: "../assets/engrenagem_a1.jpg", desc: "Engrenagem forjada em aço 1045." },
        { id: 2, nome: "Chave de Impacto Industrial", preco: 850.00, img: "../assets/chave_de_impacto_industrial.jpg", desc: "Torque de 650Nm para serviços pesados." },
        { id: 3, nome: "Controlador de Temperatura", preco: 298.00, img: "../assets/controlador_de_temperatura.png", desc: "Controlador digital PID." },
        { id: 4, nome: "Atuador Pneumático", preco: 320.00, img: "../assets/atuador_linear_12V.jpg", desc: "Cilindro de dupla ação." },
        { id: 5, nome: "Sensor Ultrassônico", preco: 215.00, img: "../assets/sensor_optico.jpg", desc: "Medição de nível sem contato." },
        { id: 6, nome: "Atuador Linear 12V", preco: 430.00, img: "../assets/atuador_pneumatico_50mm.png", desc: "Força de 1200N." },
        { id: 7, nome: "Sensor Óptico", preco: 124.50, img: "../assets/sensor_ultrassonico_hc.png", desc: "Infravermelho de alta velocidade." }
    ];

    let carrinho = [];

    function renderProducts(items) {
        const container = document.getElementById('produtos');
        container.innerHTML = '';
        items.forEach(p => {
            container.innerHTML += `
                <div class="product-card" onclick="openModal(${p.id})">
                    <div>
                        <img src="${p.img}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/200?text=Produto'">
                        <div class="price"><small>R$</small>${p.preco.toFixed(2).replace('.',',')}</div>
                        <div class="squad-express"><i class="fas fa-bolt-lightning"></i> Squad Express</div>
                        <div class="product-name">${p.nome}</div>
                    </div>
                    <button class="btn-action btn-buy-card">Clique aqui para comprar</button>
                </div>
            `;
        });
    }

    renderProducts(listaProdutos);

    function filterProducts() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = listaProdutos.filter(p => p.nome.toLowerCase().includes(query));
        renderProducts(filtered);
    }

    function openModal(id) {
        const p = listaProdutos.find(item => item.id === id);
        document.getElementById('mTitle').innerText = p.nome;
        document.getElementById('mPrice').innerHTML = `<small>R$</small>${p.preco.toFixed(2).replace('.',',')}`;
        document.getElementById('mImg').src = p.img;
        document.getElementById('mDesc').innerText = p.desc;
        document.getElementById('mQty').value = 1;

        document.getElementById('btnAddToCart').onclick = () => {
            const qtd = parseInt(document.getElementById('mQty').value);
            addToCart(p, qtd);
            closeModal('productModal');
        };

        document.getElementById('productModal').style.display = 'flex';
    }

    function addToCart(produto, qtd) {
        const existing = carrinho.find(item => item.id === produto.id);
        if (existing) { existing.qtd += qtd; } else { carrinho.push({ ...produto, qtd: qtd }); }
        updateCartUI();
    }

    function updateCartUI() {
        const count = carrinho.reduce((acc, item) => acc + item.qtd, 0);
        const badge = document.getElementById('cartCount');
        badge.innerText = count;
        badge.style.display = count > 0 ? 'block' : 'none';

        const cartList = document.getElementById('cartItemsList');
        const totalContainer = document.getElementById('totalContainer');
        cartList.innerHTML = '';
        let total = 0;

        carrinho.forEach(item => {
            const subtotal = item.preco * item.qtd;
            total += subtotal;
            cartList.innerHTML += `
                <div class="cart-item">
                    <div><strong>${item.nome}</strong><br><small>${item.qtd}x R$ ${item.preco.toFixed(2)}</small></div>
                    <div style="text-align:right"><strong>R$ ${subtotal.toFixed(2)}</strong></div>
                </div>
            `;
        });
        totalContainer.innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
    }

    function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- FUNÇÃO DE CHECKOUT SINCRONIZADA COM A API ---
    async function checkout() {
        if (carrinho.length === 0) return alert("Carrinho vazio!");

        try {
            for (const item of carrinho) {
                // Chamada exata para a rota realizar-venda do seu main.py
                const url = `${API_BASE}/realizar-venda?produto_id=${item.id}&quantidade=${item.qtd}`;
                const response = await fetch(url);
                const resData = await response.json();
                
                if (resData.status !== "sucesso") {
                    throw new Error(resData.erro || "Falha no processamento");
                }
            }
            
            alert("🚀 SUCESSO! Venda registrada e produção acionada no SCADA.");
            carrinho = [];
            updateCartUI();
            closeModal('cartModal');
        } catch (error) {
            console.error("Erro no Checkout:", error);
            alert("Erro ao sincronizar com a fábrica. Verifique se o main.py está rodando.");
        }
    }
</script>
</body>
</html>
